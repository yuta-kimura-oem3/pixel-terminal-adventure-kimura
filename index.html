<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no" />
<title>Claude Terminal Runner 16bit</title>
<style>
  :root{--bg:#202020;--panel:#262626;--line:#3a3a3a;--text:#e6e6e6;--muted:#aaa;--green:#98ffc1;--orange:#d76f4f;}
  html,body{margin:0;height:100%;background:#111;color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Hiragino Sans","Yu Gothic",sans-serif;overflow:hidden;touch-action:none;}
  #wrap{position:fixed;inset:0;display:grid;place-items:center;background:radial-gradient(circle at 50% 20%,#303030 0%,#202020 58%,#151515 100%);} 
  canvas{width:min(100vw, calc(100vh * 16 / 9));height:min(100vh, calc(100vw * 9 / 16));image-rendering:pixelated;image-rendering:crisp-edges;border:4px solid #3b3b3b;box-shadow:0 0 30px #000;background:#202020;}
  #hint{position:fixed;left:10px;right:10px;bottom:calc(10px + env(safe-area-inset-bottom));text-align:center;font-size:13px;line-height:1.35;color:#e8e8e8;text-shadow:0 2px #000;pointer-events:none;opacity:.92;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Hiragino Sans","Yu Gothic",sans-serif;}
</style>
</head>
<body>
<div id="wrap"><canvas id="game" width="480" height="270"></canvas></div>
<div id="hint">タップ / クリック / SPACE でジャンプ　・　アイテムで回復＆パワーアップ</div>
<script>
(() => {
  const canvas=document.getElementById('game');
  const ctx=canvas.getContext('2d');
  ctx.imageSmoothingEnabled=false;
  const W=480,H=270,groundY=218;
  let state='title',frame=0,score=0,best=Number(localStorage.getItem('ctr_best')||0),speed=2.05;
  let hp=3,maxHp=3,power=0,shield=0,magnet=0,spawnTimer=0,itemTimer=0;
  const player={x:62,y:groundY-38,w:40,h:39,vy:0,onGround:true,coyote:0,inv:0};
  let obstacles=[],items=[],particles=[],codeRain=[];

  function rand(a,b){return a+Math.random()*(b-a)}
  function reset(){
    state='play'; frame=0; score=0; speed=2.05; hp=3; power=0; shield=0; magnet=0; obstacles=[]; items=[]; particles=[]; spawnTimer=55; itemTimer=150;
    player.y=groundY-player.h; player.vy=0; player.onGround=true; player.coyote=0; player.inv=70;
    codeRain=[]; for(let i=0;i<48;i++) codeRain.push({x:Math.random()*W,y:Math.random()*H,t:Math.random()*80|0,s:0.7+Math.random()*1.4,txt:['$ claude','npm run','git push','deploy','> token'][i%5]});
  }
  function jump(){
    if(state==='title'||state==='over'){reset();return;}
    if(player.onGround||player.coyote>0){
      player.vy=-10.2; player.onGround=false; player.coyote=0;
      burst(player.x+18,groundY-4,'#f0a15d',10);
    }
  }
  addEventListener('keydown',e=>{if(['Space','ArrowUp','KeyW'].includes(e.code)){e.preventDefault();jump();}});
  ['pointerdown','touchstart'].forEach(ev=>addEventListener(ev,e=>{e.preventDefault();jump();},{passive:false}));

  function burst(x,y,c,n=8){for(let i=0;i<n;i++)particles.push({x,y,vx:rand(-2.2,2.2),vy:rand(-2.4,.6),life:22,c});}
  function spawnObstacle(){
    const kinds=['bug','error','bot','spike','log','portal'];
    const kind=kinds[Math.floor(Math.random()*kinds.length)];
    let o={x:W+12,y:0,w:22,h:28,kind};
    if(kind==='bug'){o.w=26;o.h=22;o.y=groundY-o.h;}
    if(kind==='error'){o.w=22;o.h=34;o.y=groundY-o.h;}
    if(kind==='bot'){o.w=24;o.h=30;o.y=groundY-o.h;}
    if(kind==='spike'){o.w=30;o.h=24;o.y=groundY-o.h;}
    if(kind==='log'){o.w=38;o.h=18;o.y=groundY-o.h;}
    if(kind==='portal'){o.w=22;o.h=45;o.y=groundY-o.h;}
    obstacles.push(o);
  }
  function spawnItem(){
    const types=['heart','shield','boost','star','magnet'];
    const type=types[Math.floor(Math.random()*types.length)];
    items.push({x:W+20,y:rand(112,178),w:18,h:18,type,vy:rand(-.02,.02),phase:Math.random()*99});
  }
  function hit(a,b,pad=4){return a.x+pad<b.x+b.w&&a.x+a.w-pad>b.x&&a.y+pad<b.y+b.h&&a.y+a.h-pad>b.y;}
  function damage(){
    if(player.inv>0)return;
    if(shield>0){shield=0;player.inv=75;burst(player.x+22,player.y+20,'#8fd7ff',18);return;}
    hp--; player.inv=90; burst(player.x+22,player.y+20,'#ff6b7a',18);
    if(hp<=0){state='over';best=Math.max(best,Math.floor(score));localStorage.setItem('ctr_best',best);}
  }
  function takeItem(it){
    if(it.type==='heart')hp=Math.min(maxHp,hp+1);
    if(it.type==='shield')shield=1;
    if(it.type==='boost')power=520;
    if(it.type==='star'){score+=25;power=300;}
    if(it.type==='magnet')magnet=520;
    burst(it.x+9,it.y+9,'#fff0a8',16);
  }
  function update(){
    frame++; codeRain.forEach(c=>{c.x-=c.s;if(c.x<-70){c.x=W+rand(0,150);c.y=rand(10,195);}});
    if(state!=='play')return;
    score+=0.085; speed=Math.min(3.75,2.05+score/310)+(power>0?.34:0);
    if(power>0)power--; if(shield>0){} if(magnet>0)magnet--; if(player.inv>0)player.inv--;
    player.vy+=0.38; player.y+=player.vy;
    if(player.y>=groundY-player.h){player.y=groundY-player.h;player.vy=0;player.onGround=true;player.coyote=7;}else{player.onGround=false;player.coyote=Math.max(0,player.coyote-1);}
    spawnTimer--; itemTimer--;
    if(spawnTimer<=0){spawnObstacle();spawnTimer=Math.max(62,98-Math.floor(score/85)+rand(-12,18));}
    if(itemTimer<=0){spawnItem();itemTimer=rand(160,235);}
    obstacles.forEach(o=>o.x-=speed*(o.kind==='log'?1.18:1)); obstacles=obstacles.filter(o=>o.x>-50);
    items.forEach(it=>{it.x-=speed*.95;it.phase+=.08;it.y+=Math.sin(it.phase)*.22;if(magnet>0){const dx=(player.x+20)-(it.x+9),dy=(player.y+18)-(it.y+9),d=Math.hypot(dx,dy);if(d<110){it.x+=dx/d*2.3;it.y+=dy/d*2.3;}}});
    items=items.filter(it=>it.x>-30);
    particles.forEach(p=>{p.x+=p.vx;p.y+=p.vy;p.vy+=.08;p.life--;}); particles=particles.filter(p=>p.life>0);
    for(const o of obstacles){if(hit(player,o,6)){if(power>0){o.x=-99;score+=8;burst(o.x+10,o.y+10,'#f0a15d',14);}else damage();}}
    for(const it of items){if(hit(player,it,1)){takeItem(it);it.x=-99;}}
    items=items.filter(it=>it.x>-40); obstacles=obstacles.filter(o=>o.x>-40);
  }

  function px(x,y,w,h,c){ctx.fillStyle=c;ctx.fillRect(Math.round(x),Math.round(y),Math.round(w),Math.round(h));}
  function label(s,x,y,size=12,c='#e8e8e8',align='left',mono=false){ctx.fillStyle=c;ctx.font=`${size}px ${mono?'monospace':'-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Hiragino Sans","Yu Gothic",sans-serif'}`;ctx.textAlign=align;ctx.fillText(s,x,y);}
  function drawClaude(x,y,t){
    const bob=Math.sin(t/12)*1.1;y+=bob;const main='#d76f4f',hi='#e9825d',shade='#a84e38',dark='#242424';
    if(shield) {px(x+0,y+0,42,42,'rgba(143,215,255,.22)');px(x+2,y+2,38,38,'rgba(143,215,255,.16)');}
    if(power>0&&frame%8<4)px(x-3,y-3,46,45,'rgba(255,240,168,.16)');
    px(x+5,y+37,30,3,'rgba(0,0,0,.35)');px(x+7,y+7,28,23,main);px(x+11,y+5,20,2,hi);px(x+7,y+28,28,3,shade);
    px(x+3,y+14,5,10,main);px(x+35,y+14,5,10,main);px(x+3,y+22,4,5,shade);px(x+36,y+22,4,5,shade);
    px(x+14,y+14,4,5,dark);px(x+28,y+14,4,5,dark);
    px(x+10,y+30,4,9,main);px(x+16,y+30,4,7,main);px(x+26,y+30,4,7,main);px(x+32,y+30,4,9,main);px(x+10,y+37,4,2,shade);px(x+32,y+37,4,2,shade);
  }
  function drawObstacle(o){
    if(o.kind==='bug'){px(o.x,o.y+8,o.w,o.h-8,'#2cff77');px(o.x+3,o.y,o.w-6,8,'#168f47');px(o.x+4,o.y+13,4,4,'#06100a');px(o.x+o.w-8,o.y+13,4,4,'#06100a');label('BUG',o.x-1,o.y-4,8,'#98ffc1','left',true);}
    if(o.kind==='error'){px(o.x,o.y,o.w,o.h,'#ff4f61');px(o.x+3,o.y+3,o.w-6,o.h-6,'#7d1421');label('!',o.x+7,o.y+22,18,'#fff0b0','left',true);}
    if(o.kind==='bot'){px(o.x+3,o.y+7,18,18,'#9a9a9a');px(o.x+7,o.y+1,10,6,'#cfcfcf');px(o.x+7,o.y+14,3,3,'#101010');px(o.x+15,o.y+14,3,3,'#101010');px(o.x+1,o.y+25,5,5,'#777');px(o.x+18,o.y+25,5,5,'#777');}
    if(o.kind==='spike'){px(o.x,o.y+18,30,6,'#bcbcbc');px(o.x+3,o.y+10,6,8,'#f0f0f0');px(o.x+12,o.y+2,7,16,'#f0f0f0');px(o.x+22,o.y+10,6,8,'#f0f0f0');}
    if(o.kind==='log'){px(o.x,o.y+4,38,14,'#8a5b35');px(o.x+4,o.y,9,4,'#b07a4b');px(o.x+22,o.y,9,4,'#b07a4b');label('404',o.x+8,o.y+15,9,'#ffe0a8','left',true);}
    if(o.kind==='portal'){px(o.x+4,o.y,14,45,'#6d5cff');px(o.x+7,o.y+5,8,35,'#161030');px(o.x+9,o.y+10,4,25,'#a99cff');}
  }
  function drawItem(it){
    const x=it.x,y=it.y;
    if(it.type==='heart'){px(x+5,y+3,4,4,'#ff5a78');px(x+11,y+3,4,4,'#ff5a78');px(x+3,y+7,14,6,'#ff5a78');px(x+6,y+13,8,4,'#ff5a78');px(x+9,y+17,2,2,'#ff5a78');}
    if(it.type==='shield'){px(x+4,y+2,12,4,'#8fd7ff');px(x+3,y+6,14,6,'#5aaee8');px(x+5,y+12,10,4,'#8fd7ff');px(x+8,y+16,4,3,'#e8ffff');}
    if(it.type==='boost'){px(x+7,y+1,5,10,'#fff0a8');px(x+4,y+10,12,3,'#f0a15d');px(x+7,y+13,5,5,'#ff6b3a');}
    if(it.type==='star'){px(x+8,y+1,3,5,'#fff0a8');px(x+3,y+7,13,3,'#fff0a8');px(x+6,y+4,7,11,'#ffd866');px(x+5,y+14,3,4,'#fff0a8');px(x+12,y+14,3,4,'#fff0a8');}
    if(it.type==='magnet'){px(x+3,y+4,4,11,'#ff6b7a');px(x+13,y+4,4,11,'#ff6b7a');px(x+7,y+12,6,4,'#bcbcbc');px(x+3,y+2,4,3,'#bcbcbc');px(x+13,y+2,4,3,'#bcbcbc');}
  }
  function drawBG(){
    px(0,0,W,H,'#202020'); for(const c of codeRain)label(c.txt,c.x,c.y,9,'rgba(152,255,193,.20)','left',true);
    px(16,18,W-32,178,'#242424');px(16,18,W-32,4,'#3a3a3a');label('✳ Claude Code',240,37,17,'#dedede','center');
    label('> claude run terminal-adventure --kid-mode --items',26,59,11,'#bfbfbf','left',true);
    for(let x=0;x<W;x+=28){px(x,groundY,18,4,'#d76f4f');px(x+8,groundY+12,18,3,'#5c5c5c');}
    px(0,groundY+4,W,H-groundY,'#262626');
  }
  function drawHUD(){
    for(let i=0;i<maxHp;i++){px(20+i*17,238,12,10,i<hp?'#ff5a78':'#4b4b4b');px(23+i*17,248,6,3,i<hp?'#ff5a78':'#4b4b4b');}
    label(`SCORE ${Math.floor(score)}`,112,250,13,'#98ffc1','left',true);label(`BEST ${best}`,384,250,13,'#98ffc1','left',true);
    if(shield)label('SHIELD',290,250,11,'#8fd7ff','left',true); else if(power>0)label('POWER',290,250,11,'#fff0a8','left',true); else if(magnet>0)label('MAGNET',290,250,11,'#ff9bd4','left',true);
  }
  function draw(){
    ctx.clearRect(0,0,W,H);drawBG();particles.forEach(p=>px(p.x,p.y,3,3,p.c));items.forEach(drawItem);drawClaude(player.x,player.y,frame);obstacles.forEach(drawObstacle);drawHUD();
    if(state==='title'){px(54,68,372,118,'rgba(0,0,0,.78)');label('CLAUDE TERMINAL RUNNER',240,101,20,'#f0a15d','center',true);label('16bitゲーム × 詳細テキストUI',240,126,14,'#e8e8e8','center');label('タップでスタート / 長めジャンプ',240,151,15,'#98ffc1','center');label('ハート・シールド・スターを集めよう',240,172,13,'#d8d8d8','center');}
    if(state==='over'){px(92,72,296,108,'rgba(0,0,0,.80)');label('GAME OVER',240,108,22,'#ff6b7a','center',true);label(`SCORE ${Math.floor(score)} / BEST ${best}`,240,135,14,'#98ffc1','center',true);label('もう一度タップ！',240,160,16,'#f0a15d','center');}
  }
  function loop(){update();draw();requestAnimationFrame(loop)} loop();
})();
</script>
</body>
</html>
